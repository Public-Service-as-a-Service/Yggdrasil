logging:
  level:
    root: INFO

spring:
  application:
    name: csv-filereader
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: false
  jdbc:
    template:
      fetch-size: 1000

import:
  enabled: true
  # File locations
  incoming-dir: /data/incoming
  processed-dir: /data/processed
  failed-dir: /data/failed
  file-source-dir: /data/temp
  # Expected file names
  org-file-name: ${ORGANIZATION_FILE_NAME}
  emp-file-name: ${EMPLOYEE_FILE_NAME}
  # Batch size
  employee-batch-size: ${EMPLOYEE_BATCH_SIZE}
  organization-batch-size: ${ORGANIZATION_BATCH_SIZE}

scheduler:
  scheduled-org-import:
    cron: "0 0 * * * *"
    name: "org-import"
    shedlock-lock-at-most-for: "PT2H"
    maximum-execution-time: "PT2H"
  scheduled-emp-import:
    cron: "0 0 * * * *"
    name: "emp-import"
    shedlock-lock-at-most-for: "PT2H"
    maximum-execution-time: "PT2H"
integration:
  sftp:
    username: ${SFTP_USERNAME}
    password: ${SFTP_PASSWORD}
    remote-host: ${SFTP_URL}
    connect-timeout: "PT15S"
    session-timeout: "PT15S"

openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'