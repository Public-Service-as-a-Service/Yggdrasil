logging:
  level:
    root: INFO

user:
  credentials:
    email: ${USER_CREDENTIALS_EMAIL}
    password: ${USER_CREDENTIALS_PASSWORD}
    phoneNumber: ${USER_CREDENTIALS_PHONENUMBER}
    municipalityId: ${USER_CREDENTIALS_MUNICIPALITYID}

spring:
  application:
    name: users
  datasource:
    url: ${ENV_DB_URL}
    username: ${ENV_DB_USERNAME}
    password: ${ENV_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    properties:
      jakarta:
        persistence:
          schema-generation:
            database:
              action: validate
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'